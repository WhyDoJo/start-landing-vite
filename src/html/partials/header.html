<header class="header">
  <div class="header__top">
    <div class="container header__container">
      <a class="header__logo" href="#">Reel to real</a>
    </div>
    <nav class="nav">
      <ul class="nav__list">
        <li class="nav__item">
          <a class="nav__link" href="shops.html">Магазины</a>

        <li class="nav__item">

    <div class="header__actions">

        class="header__favorites header__action"

  <div class="header__bottom">

      <button class="header-btn">
